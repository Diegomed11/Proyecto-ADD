{% extends "base.html" %}

{% block title %}Error {{ codigo }}{% endblock %}
{% block breadcrumb %}~/error{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh] text-center stagger-1">
    <p class="font-mono text-[64px] leading-none font-semibold text-primary/80 tnum">{{ codigo }}</p>
    <h2 class="text-h2 text-on-surface mt-4">{{ titulo }}</h2>
    <p class="text-on-surface-variant text-sm mt-2 max-w-md">{{ mensaje }}</p>
    <a href="/app" class="btn-primary px-5 py-2.5 rounded-md text-sm mt-8 inline-flex items-center gap-2">
        <span class="material-symbols-outlined text-[18px]">home</span>
        Volver al inicio
    </a>
</div>
{% endblock %}
